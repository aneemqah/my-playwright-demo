<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .header-bg {
        background-color: rgba(255, 255, 255, 0.8);
      }
      .btn-pastel {
        background-color: #a8dadc;
        border-color: #a8dadc;
        color: #1d3557;
      }
      .btn-pastel:hover {
        background-color: #457b9d;
        border-color: #457b9d;
        color: white;
      }
      .title-color {
        color: #457b9d;
      }
      .subtext-color {
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <header class="header-bg py-4">
      <div class="container">
        <h1 class="text-center title-color">EAS</h1>
      </div>
    </header>
    <main class="container mt-5">
      <h2 class="text-center mb-3 title-color">Playwright Testing</h2>
      <p class="text-center mb-4 subtext-color">
        This is some subtext below the title.
      </p>
      <div class="text-center">
        <button
          class="btn btn-pastel btn-lg"
          data-bs-toggle="modal"
          data-bs-target="#myModal"
        >
          Click me
        </button>
      </div>
    </main>
    <!-- Modal -->
    <div
      class="modal fade"
      id="myModal"
      tabindex="-1"
      aria-labelledby="myModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="myModalLabel">Hello!</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            This is a simple modal that opens when you click the button.
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
